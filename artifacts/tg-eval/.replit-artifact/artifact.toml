kind = "web"
previewPath = "/"
title = "Employee Evaluation Mini App"
version = "1.0.0"
id = "artifacts/tg-eval"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26179

[services.development]
run = "pnpm --filter @workspace/tg-eval run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tg-eval", "run", "build" ]
publicDir = "artifacts/tg-eval/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26179"
BASE_PATH = "/"
